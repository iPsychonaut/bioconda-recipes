{% set name = "egap" %}
{% set version = "3.4.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/iPsychonaut/EGAP/archive/refs/tags/v{{ version }}.tar.gz
    sha256: c55568828315dff4dbefe24b619ac4adefd85a9630105d88e9d99516fd10ee7f
  - url: https://github.com/iPsychonaut/runner/archive/refs/tags/v0.0.0.tar.gz
    sha256: 4e67bb1e970dadb86425cb2698e0e2e34f70d78cbf77a32f73c13f66dffb55fc

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin=None) }}

requirements:
  host:
    - python >=3.8,<3.9
    - pip
  run:
    - python >=3.8,<3.9
    # ── tiara constraint chain (assembly decontamination) ───────────────────
    # tiara 1.0.3 pulls in numba=0.52.x which pulls in llvmlite=0.35.x.
    # All three need matching py38 builds, which exist on conda-forge
    # (verified: llvmlite-0.35.0 py38h4630a5e_*, numba-0.52.0 py38h51da96c_0,
    # numpy-1.19.5 py38h8246c76_3). Pin explicitly so the bioconda CI
    # solver does not wander into py39 / cuda libarrow paths it cannot
    # satisfy. Do NOT loosen any of these without first upgrading tiara
    # to a release that drops the numba=0.52 pin.
    - numpy ==1.19.5
    - numba ==0.52.0
    - llvmlite ==0.35.0
    - pandas >=1.4.4,<2.0
    - matplotlib-base >=3.5.3,<3.7
    # ── assemblers / aligners ───────────────────────────────────────────────
    - masurca >=4.1.4
    - quast >=5.3.0
    - flye >=2.9.5,<3.0a0
    - spades >=4.2.0
    - hifiasm >=0.25.0
    - pbccs >=6.4.0
    - racon >=1.5.0
    - minimap2 >=2.30
    - bwa-mem2 >=2.3
    - gfatools >=0.5.5
    # ── read QC / preprocessing ─────────────────────────────────────────────
    - trimmomatic >=0.40
    - fastqc >=0.12.1
    - bbmap >=39.81
    - nanoplot >=1.46.2
    - filtlong >=0.3.1
    - sra-tools >=3.2.0
    - kmc >=3.2.4
    # ── decontamination (new in v3.4.x) ─────────────────────────────────────
    - kraken2 >=2.1.6
    - tiara ==1.0.3
    # ── polishing / curation ────────────────────────────────────────────────
    - samtools >=1.23.1
    - bamtools >=2.5.3
    - pilon >=1.24
    - purge_dups >=1.2.6
    - ragtag >=2.1.0
    - tgsgapcloser >=1.2.1
    - abyss >=2.3.10
    # ── QC / completeness ───────────────────────────────────────────────────
    - compleasm >=0.2.7
    - busco >=5.8.3
    # ── error correction / hybrid ───────────────────────────────────────────
    - bifrost >=1.3.5
    - ratatosk >=0.9.0
    - sepp >=4.5.1
    # ── utilities & compression ─────────────────────────────────────────────
    - pigz >=2.8
    - psutil >=6.0.0
    - ncbi-datasets-cli >=18.22.1
    # ── Python libraries ────────────────────────────────────────────────────
    - biopython >=1.83
    - beautifulsoup4 >=4.12.3
    - termcolor >=2.4.0
    - jinja2 >=3.1.4
    - geopy >=2.4.1
    - tabulate >=0.9.0
    - openpyxl >=3.1.5
    - requests >=2.32.3
    - pyinaturalist >=0.21.1
    - rich >=13.9.4
    - textual >=0.89.1

test:
  requires:
    - python
  commands:
    - EGAP --help
    - EGAP_TUI --help

about:
  home: https://github.com/iPsychonaut/EGAP
  license: BSD-3-Clause
  license_file: LICENSE
  summary: "EGAP pipeline for genome assembly and QC analysis"
  description: |
    EGAP (Entheome Genome Assembly Pipeline) is a versatile bioinformatics
    pipeline for hybrid genome assembly from Oxford Nanopore, Illumina, and
    PacBio data. It supports multiple input modes and assembly methods and
    determines the best based on multiple metrics: BUSCO Completeness
    (Single + Duplicated), Assembly Contig Count, Assembly N50, Assembly L50,
    and Assembly GC-content. v3.4.x adds Kraken2 read decontamination and
    Tiara assembly decontamination.

extra:
  notes: |
    This package installs the EGAP command in $PREFIX/bin along with the
    EGAP_TUI command for the interactive Textual interface. The TUI can
    also be reached via `EGAP --tui`. Please refer to the upstream GitHub
    page for usage instructions.
  recipe-maintainers:
    - iPsychonaut
